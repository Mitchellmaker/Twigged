<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="Twigged is a voice-first memory assistant. Tell Twigged where something is and ask naturally later."
  />

  <title>Twigged</title>

  <style>
    :root {
      --background: #111214;
      --primary: #f5f5f7;
      --secondary: #aaa7a1;
      --accent: #f9b70a;
      --line: rgba(245, 245, 247, 0.11);
      --glass: rgba(28, 29, 31, 0.76);
      --page-width: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: var(--background);
    }

    body {
      margin: 0;
      overflow-x: hidden;
      background: var(--background);
      color: var(--primary);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "SF Pro Text",
        "Helvetica Neue",
        Arial,
        sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      overflow: hidden;
    }

    .section-width {
      width: min(var(--page-width), calc(100% - 48px));
      margin: 0 auto;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* =========================
       SECTION 0 - NAVIGATION
    ========================= */

    .nav-wrap {
      position: fixed;
      top: 18px;
      right: 0;
      left: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      padding: 0 18px;
      pointer-events: none;
    }

    .nav {
      pointer-events: auto;
      display: grid;
      grid-template-columns: 44px 1fr;
      align-items: center;
      width: min(760px, 100%);
      min-height: 58px;
      padding: 7px 12px;
      border: 1px solid rgba(245, 245, 247, 0.12);
      border-radius: 999px;
      background: var(--glass);
      box-shadow: 0 14px 50px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(24px) saturate(130%);
      -webkit-backdrop-filter: blur(24px) saturate(130%);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
    }

    .nav-brand img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .nav-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: center;
      width: 100%;
    }

    .nav-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 8px;
      color: rgba(245, 245, 247, 0.76);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      transition:
        color 180ms ease,
        background 180ms ease;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
      color: var(--primary);
      outline: none;
    }

    /* =========================
       SECTION 1 - HERO
    ========================= */

    .hero {
      padding: 118px 24px 34px;
    }

    .hero-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(920px, 100%);
      margin: 0 auto;
      text-align: center;
    }

    .hero-logo {
      width: clamp(250px, 42vw, 490px);
      margin: 0 auto 22px;
    }

    .hero h1 {
      max-width: 900px;
      margin: 0;
      font-size: clamp(50px, 7vw, 100px);
      font-weight: 750;
      line-height: 0.94;
      letter-spacing: -0.068em;
    }

    .hero h1 span {
      color: var(--accent);
    }

    .hero-copy {
      max-width: 540px;
      margin: 24px 0 24px;
      color: var(--secondary);
      font-size: clamp(18px, 2vw, 25px);
      line-height: 1.32;
      letter-spacing: -0.03em;
    }

    .hero-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 24px;
      border: 1px solid rgba(245, 245, 247, 0.14);
      border-radius: 999px;
      background: rgba(245, 245, 247, 0.08);
      color: var(--primary);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.015em;
      transition:
        transform 180ms ease,
        background 180ms ease;
    }

    .hero-button:hover,
    .hero-button:focus-visible {
      background: rgba(245, 245, 247, 0.12);
      transform: translateY(-1px);
      outline: none;
    }

    /* =========================
       SECTION 2 - SCREENSHOTS
    ========================= */

    .screenshots {
      padding: 34px 0 54px;
    }

    .screenshots-heading {
      width: min(var(--page-width), calc(100% - 48px));
      margin: 0 auto 18px;
    }

    .carousel {
      display: flex;
      gap: 18px;
      overflow-x: auto;
      padding: 0 0 18px;
      scroll-padding-inline: calc(50vw - (min(350px, 74vw) / 2));
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      overscroll-behavior-inline: contain;
      -webkit-overflow-scrolling: touch;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .carousel::before,
    .carousel::after {
      content: "";
      flex: 0 0 calc(50vw - (min(350px, 74vw) / 2));
    }

    .carousel img {
      flex: 0 0 auto;
      width: min(350px, 74vw);
      border-radius: 38px;
      scroll-snap-align: center;
      scroll-snap-stop: always;
    }

   /* =========================
   SECTION 3 - TELL / ASK / FIND
========================= */

.experience {
  padding: 0 24px;
}

.experience-item {
  display: grid;
  grid-template-columns: minmax(280px, 400px) minmax(280px, 460px);
  align-items: center;
  justify-content: center;
  gap: clamp(34px, 6vw, 72px);
  width: min(980px, 100%);
  margin: 0 auto;
  padding: 12px 0;
}

.experience-item.reverse {
  grid-template-columns: minmax(280px, 460px) minmax(280px, 400px);
}

.experience-item.reverse .experience-copy {
  order: 1;
}

.experience-item.reverse .experience-phone {
  order: 2;
}

.experience-phone {
  display: flex;
  align-items: center;
  justify-content: center;
}

.experience-phone img {
  width: min(360px, 78vw);
  max-height: 650px;
  object-fit: contain;
}

.experience-copy {
  max-width: 430px;
}

.experience-copy .eyebrow {
  margin: 0 0 7px;
  color: #f9b70a;
}

.experience-copy h2 {
  margin: 0 0 8px;
  font-size: clamp(48px, 6vw, 82px);
  font-weight: 760;
  line-height: 0.94;
  letter-spacing: -0.065em;
}

.experience-copy p:last-child {
  margin: 0;
  color: var(--secondary);
  font-size: clamp(18px, 2vw, 25px);
  line-height: 1.28;
  letter-spacing: -0.035em;
}

/* =========================
   SECTION 3 - MOBILE
========================= */

@media (max-width: 820px) {
  .experience {
    padding: 0 18px;
  }

  .experience-item,
  .experience-item.reverse {
    grid-template-columns: 1fr;
    gap: 0;
    padding: 6px 0 12px;
    text-align: center;
  }

  .experience-item.reverse .experience-phone,
  .experience-item.reverse .experience-copy {
    order: initial;
  }

  .experience-phone {
    order: 1;
  }

  .experience-copy {
    order: 2;
    max-width: 360px;
    margin: -14px auto 0;
  }

  .experience-phone img {
    width: min(380px, 88vw);
    max-height: none;
  }

  .experience-copy h2 {
    margin-bottom: 6px;
    font-size: clamp(48px, 14vw, 64px);
  }

  .experience-copy p:last-child {
    max-width: 330px;
    margin: 0 auto;
    font-size: 17px;
    line-height: 1.28;
  }
}
      <!-- =========================
      SECTION 6 - PRIVACY
      ========================= -->
      <section id="privacy" class="privacy">
        <div class="privacy-inner">

          <p class="eyebrow">Privacy</p>

          <h2>Your memories belong to you.</h2>

          <p class="privacy-intro">
            Twigged is quiet by design.
          </p>

          <div class="privacy-list">
            <p>No accounts.</p>
            <p>No advertising.</p>
            <p>No subscriptions.</p>
            <p>Everything stays on your device.</p>
            <p>Works offline after information has been saved.</p>
          </div>

        </div>
      </section>

      <!-- =========================
      SECTION 7 - SUPPORT
      ========================= -->
      <section id="support" class="support">
        <div class="support-inner">

          <h2>Support</h2>

          <p>
            Need help with Twigged, or want to contact the maker?
          </p>

          <div class="support-actions">
            <a
              class="support-button primary"
              href="mailto:Mitchellmaker.apps@gmail.com"
            >
              Email Support
            </a>

            <a class="support-button" href="#top">
              Back to top
            </a>
          </div>

        </div>
      </section>

    </main>

    <!-- =========================
    SECTION 8 - FOOTER
    ========================= -->
    <footer class="footer">
      © 2026 MitchellMaker. Twigged.
    </footer>

  </div>
</body>
</html>
